<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f2f5;display:flex;justify-content:center;align-items:center;min-height:100vh}
.login{background:#fff;border-radius:16px;padding:40px;box-shadow:0 4px 24px rgba(0,0,0,.1);text-align:center;max-width:400px;width:90%}
.login h1{font-size:28px;margin-bottom:6px}
.login p{color:#7f8c8d;font-size:13px;margin-bottom:24px}
.login input{width:100%;padding:12px 16px;border:2px solid #e0e0e0;border-radius:10px;font-size:15px;outline:none;transition:border .2s}
.login input:focus{border-color:#2e86c1}
.login button{width:100%;padding:12px;background:#2e86c1;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-top:14px;transition:background .2s}
.login button:hover{background:#2471a3}
.err{color:#e74c3c;font-size:12px;margin-top:10px;display:none}
.loading{display:none;margin-top:14px;color:#7f8c8d;font-size:13px}
</style>

async function doLogin() {
  var pw = document.getElementById("pw").value;
  if (!pw) return false;
  document.getElementById("btn").style.display = "none";
  document.getElementById("ld").style.display = "block";
  document.getElementById("err").style.display = "none";
  try {
    var raw = Uint8Array.from(atob(ENC), function(c){return c.charCodeAt(0)});
    var salt = raw.slice(0, 16);
    var iv = raw.slice(16, 28);
    var ct = raw.slice(28);
    var enc = new TextEncoder();
    var keyMaterial = await crypto.subtle.importKey("raw", enc.encode(pw), "PBKDF2", false, ["deriveBits","deriveKey"]);
    var key = await crypto.subtle.deriveKey({name:"PBKDF2", salt:salt, iterations:100000, hash:"SHA-256"}, keyMaterial, {name:"AES-GCM", length:256}, false, ["decrypt"]);
    var decrypted = await crypto.subtle.decrypt({name:"AES-GCM", iv:iv}, key, ct);
    var html = new TextDecoder().decode(decrypted);
    document.open();
    document.write(html);
    document.close();
  } catch(e) {
    document.getElementById("err").style.display = "block";
    document.getElementById("btn").style.display = "block";
    document.getElementById("ld").style.display = "none";
    document.getElementById("pw").value = "";
    document.getElementById("pw").focus();
  }
  return false;
}
</script>
